services:
  mysql:
    image: mysql:8.4
    container_name: nbgstravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nbgstravel
      MYSQL_USER: nbgstravel
      MYSQL_PASSWORD: nbgstravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
